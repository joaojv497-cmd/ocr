syntax = "proto3";

package ocr;

import "types.proto";


// ---------------------------------------------------------------------------
// Template structure
// ---------------------------------------------------------------------------

message TemplateSection {
  string name = 1;
  string description = 2;
  bool required = 3;
  repeated TemplateSection subsections = 4;
}

message DocumentTemplate {
  string name = 1;
  string description = 2;
  repeated TemplateSection sections = 3;
}

// ---------------------------------------------------------------------------
// LLM configuration
// ---------------------------------------------------------------------------

message LLMConfig {
  string provider = 1;
  string model = 2;
  string api_key = 3;
  float temperature = 4;
  int32 max_tokens = 5;
}

// ---------------------------------------------------------------------------
// ProcessDocument RPC
// ---------------------------------------------------------------------------

message ProcessDocumentRequest {
  string document_guid = 1;
  string bucket = 2;
  string file_key = 3;
  string language = 4;
  bool enable_chunking = 5;

  oneof template_option {
    string template_name = 6;
    DocumentTemplate template = 7;
  }

  LLMConfig llm_config = 8;
}

message ProcessDocumentResponse {
  OCRStatus status = 1;
  OCRStage stage = 2;
  int32 progress = 3;
  int32 chunk_index = 4;
  repeated int32 page_numbers = 5;
  string text = 6;
  string chunk_metadata = 7;
  int32 total_chunks = 8;
  string chunking_method = 9;
  string template_used = 10;
  string error_message = 11;
}

// ---------------------------------------------------------------------------
// ListProviders RPC
// ---------------------------------------------------------------------------

message ListProvidersRequest {}

message ListProvidersResponse {
  repeated string providers = 1;
}

// ---------------------------------------------------------------------------
// ListTemplates RPC
// ---------------------------------------------------------------------------

message ListTemplatesRequest {}

message TemplateInfo {
  string name = 1;
  string description = 2;
  bool is_custom = 3;
  string document_types = 4;
}

message ListTemplatesResponse {
  repeated TemplateInfo templates = 1;
}

// ---------------------------------------------------------------------------
// ValidateDocument RPC
// ---------------------------------------------------------------------------

message ValidateDocumentRequest {
  string bucket = 1;
  string file_key = 2;
}

message ValidateDocumentResponse {
  bool exists = 1;
  bool supported = 2;
  string message = 3;
}

// ---------------------------------------------------------------------------
// ValidateTemplate RPC
// ---------------------------------------------------------------------------

message ValidateTemplateRequest {
  DocumentTemplate template = 1;
}

message ValidateTemplateResponse {
  bool is_valid = 1;
  string validation_message = 2;
  repeated string missing_fields = 3;
  repeated string invalid_fields = 4;
}

// ---------------------------------------------------------------------------
// HealthCheck RPC
// ---------------------------------------------------------------------------

message HealthCheckRequest {}

message HealthCheckResponse {
  HealthStatus status = 1;
  string message = 2;
}

// ---------------------------------------------------------------------------
// Service definition
// ---------------------------------------------------------------------------

service OCRService {
  rpc ProcessDocument(ProcessDocumentRequest) returns (stream ProcessDocumentResponse);
  rpc ListProviders(ListProvidersRequest) returns (ListProvidersResponse);
  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse);
  rpc ValidateDocument(ValidateDocumentRequest) returns (ValidateDocumentResponse);
  rpc ValidateTemplate(ValidateTemplateRequest) returns (ValidateTemplateResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}
